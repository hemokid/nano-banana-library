<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nano Banana — Architecture Prompt Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-name">Nano Banana</span>
      <span class="brand-tagline">Architecture Prompt Library</span>
    </div>
    <nav id="category-nav" aria-label="Categories"></nav>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────────────────── -->
  <main id="main">
    <header id="main-header">
      <h1 id="category-heading">All Prompts</h1>
      <div id="subcategory-pills"></div>
    </header>
    <div id="card-grid"></div>
  </main>

  <!-- ── Detail Panel ──────────────────────────────────────────────────── -->
  <div id="panel-backdrop" hidden></div>
  <aside id="detail-panel" hidden aria-label="Prompt detail">
    <button id="panel-close" aria-label="Close panel">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M2 2l14 14M16 2L2 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="panel-content"></div>
  </aside>

  <!-- ── Lightbox ──────────────────────────────────────────────────────── -->
  <div id="lightbox" hidden>
    <button id="lightbox-close" aria-label="Close image">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M2 2l16 16M18 2L2 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <!-- ── Toast ─────────────────────────────────────────────────────────── -->
  <div id="toast" aria-live="polite">Copied!</div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
